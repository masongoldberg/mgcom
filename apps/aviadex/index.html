<!DOCTYPE html>
<html>
  <head>
    <title>Aviadex | Mason Goldberg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg: #fff8f4;
        --surface: #ffffff;
        --surface-soft: #fff1e4;
        --surface-strong: #ffebd3;
        --surface-accent: #87ceeb;
        --line: #6f787d;
        --line-soft: #bfc8cd;
        --text: #281801;
        --muted: #4f5a5f;
        --accent: #0c6780;
        --accent-2: #3d6751;
        --accent-3: #616207;
        --danger: #ba1a1a;
        --shadow: #cfb48f;
        --shadow-strong: #b29065;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        image-rendering: pixelated;
      }

      body.page-hidden .shell {
        visibility: hidden;
      }

      .grid-overlay {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(97, 98, 7, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(97, 98, 7, 0.08) 1px, transparent 1px);
        background-size: 16px 16px;
        pointer-events: none;
        opacity: 0.5;
      }

      .shell {
        width: min(100% - 18px, 1120px);
        margin: 0 auto;
        padding: 10px 0 24px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .top-link,
      .logout-btn,
      .nav-btn,
      .pixel-btn,
      .bird-card {
        font: inherit;
      }

      .top-link,
      .logout-btn,
      .nav-btn {
        color: var(--accent);
        text-decoration: none;
        background: none;
        border: none;
        padding: 0;
      }

      .logout-btn,
      .nav-btn {
        cursor: pointer;
      }

      .hud {
        display: grid;
        gap: 10px;
      }

      .view {
        display: none;
        gap: 10px;
      }

      .view.is-active {
        display: grid;
      }

      .app-nav {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .nav-pill {
        border: 2px solid var(--line);
        border-radius: 9999px;
        background: var(--surface-soft);
        color: var(--accent);
        cursor: pointer;
        font-family: "Press Start 2P", monospace;
        font-size: 10px;
        line-height: 1.6;
        padding: 12px 10px;
        text-align: center;
        box-shadow: 4px 4px 0 0 var(--shadow);
      }

      .nav-pill.is-active {
        background: var(--surface-accent);
        color: #ffffff;
        box-shadow: 4px 4px 0 0 #5ca7c7;
      }

      .hero,
      .dex,
      .panel,
      .bird-card,
      .count,
      .status {
        border: 2px solid var(--line);
        border-radius: 24px;
        box-shadow: 4px 4px 0 0 var(--shadow);
      }

      .hero,
      .dex,
      .panel {
        background: var(--surface);
      }

      .hero {
        padding: 14px;
      }

      .eyebrow,
      .panel-label,
      .meta-label,
      .bird-id,
      .entry-tag,
      .status,
      .footer,
      .nav-btn {
        font-family: "Press Start 2P", monospace;
        letter-spacing: 0.06em;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 10px;
        line-height: 1.6;
      }

      h1 {
        margin: 12px 0 0;
        font-family: "Press Start 2P", monospace;
        font-size: clamp(26px, 8vw, 48px);
        line-height: 1.2;
      }

      .subtitle {
        margin: 14px 0 0;
        max-width: 720px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
        font-weight: 500;
      }

      .counts {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .count {
        background: var(--surface-soft);
        padding: 12px;
        border-radius: 20px;
      }

      .count-number {
        margin-top: 8px;
        font-size: clamp(32px, 9vw, 44px);
        color: var(--accent);
        font-family: "Press Start 2P", monospace;
        line-height: 1.2;
      }

      .count-copy {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .dex {
        display: grid;
        gap: 10px;
        padding: 10px;
      }

      .dex-roster {
        display: grid;
        gap: 10px;
        padding: 10px;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .roster-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .panel-label {
        color: var(--accent);
        font-size: 10px;
        line-height: 1.6;
      }

      .search {
        width: 100%;
        min-width: 0;
        padding: 10px 12px;
        border: 2px solid var(--line);
        border-radius: 9999px;
        background: var(--surface-soft);
        color: var(--text);
        font: inherit;
        font-size: 16px;
        outline: none;
      }

      .search::placeholder {
        color: #7a8070;
      }

      .dex-body {
        display: grid;
        gap: 10px;
      }

      .roster-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .roster-card {
        display: grid;
        gap: 10px;
        width: 100%;
        padding: 12px;
        text-align: left;
        background: var(--surface-soft);
        cursor: pointer;
        border: 2px solid var(--line);
        border-radius: 22px;
        box-shadow: 4px 4px 0 0 var(--shadow);
      }

      .roster-card.is-active {
        border-color: var(--accent);
        background: var(--surface-strong);
      }

      .roster-card.is-locked {
        opacity: 0.92;
      }

      .roster-card-top {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 8px;
      }

      .roster-sprite {
        width: 100%;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #d8f0fb 0%, #b6def3 48%, #c7e7b5 48%, #c7e7b5 100%);
        border: 2px solid var(--line);
        border-radius: 18px;
        padding: 8px;
      }

      .roster-name {
        font-size: 15px;
        line-height: 1.35;
        font-weight: 700;
      }

      .roster-meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .meta-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .roster-tag {
        display: inline-block;
        margin-top: 2px;
        padding: 5px 8px;
        border-radius: 9999px;
        border: 2px solid var(--line);
        background: #bfedd1;
        color: var(--accent-2);
        font-family: "Press Start 2P", monospace;
        font-size: 9px;
        line-height: 1.6;
      }

      .rarity-pill {
        display: inline-block;
        padding: 5px 8px;
        border-radius: 9999px;
        border: 2px solid var(--line);
        font-family: "Press Start 2P", monospace;
        font-size: 9px;
        line-height: 1.6;
        text-transform: uppercase;
      }

      .rarity-common {
        background: #bfedd1;
        color: #254f3a;
      }

      .rarity-uncommon {
        background: #baeaff;
        color: #004d62;
      }

      .rarity-rare {
        background: #e1d2ff;
        color: #5c3697;
      }

      .rarity-legendary {
        background: #f4d67a;
        color: #6a5200;
      }

      .list {
        display: grid;
        gap: 8px;
        max-height: 620px;
        overflow: auto;
        padding-right: 2px;
      }

      .bird-card {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        width: 100%;
        padding: 10px;
        text-align: left;
        background: var(--surface-soft);
        cursor: pointer;
        border-radius: 20px;
      }

      .bird-card.is-active {
        border-color: var(--accent);
        background: var(--surface-strong);
      }

      .bird-card.is-locked {
        opacity: 0.88;
      }

      .sprite-frame,
      .detail-sprite-frame {
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, #d8f0fb 0%, #b6def3 48%, #c7e7b5 48%, #c7e7b5 100%);
        border: 2px solid var(--line);
        border-radius: 18px;
      }

      .sprite-frame {
        width: 76px;
        height: 76px;
      }

      .sprite-frame svg,
      .detail-sprite-frame svg,
      .locked-outline,
      .sprite-img {
        image-rendering: pixelated;
        shape-rendering: crispEdges;
      }

      .locked-outline {
        display: block;
        width: 100%;
        height: 100%;
      }

      .locked-asset {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .locked-asset img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .locked-asset-outline {
        filter:
          brightness(0) saturate(100%)
          drop-shadow(1px 0 0 #425b74)
          drop-shadow(-1px 0 0 #425b74)
          drop-shadow(0 1px 0 #425b74)
          drop-shadow(0 -1px 0 #425b74)
          drop-shadow(1px 1px 0 #425b74)
          drop-shadow(-1px -1px 0 #425b74)
          drop-shadow(1px -1px 0 #425b74)
          drop-shadow(-1px 1px 0 #425b74);
        opacity: 1;
      }

      .locked-asset-fill {
        filter: brightness(0) saturate(100%) invert(97%) sepia(17%) saturate(294%) hue-rotate(318deg) brightness(104%) contrast(94%);
      }

      .sprite-img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .bird-meta {
        min-width: 0;
      }

      .bird-id {
        color: var(--accent-3);
        font-size: 10px;
        line-height: 1.6;
      }

      .bird-name {
        margin-top: 6px;
        font-size: 18px;
        line-height: 1.2;
        font-weight: 700;
      }

      .bird-region {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .panel {
        padding: 12px;
      }

      .detail-top {
        display: grid;
        gap: 10px;
      }

      .detail-sprite-frame {
        min-height: 260px;
        padding: 14px;
      }

      .detail-sprite-frame.locked {
        background: linear-gradient(180deg, #f6efe6 0%, #e9dcc8 48%, #dae6c8 48%, #dae6c8 100%);
      }

      .detail-name {
        margin-top: 12px;
        font-family: "Press Start 2P", monospace;
        font-size: clamp(18px, 5.4vw, 28px);
        line-height: 1.45;
      }

      .detail-subtitle {
        margin-top: 10px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
        font-weight: 600;
      }

      .entry-tag {
        display: inline-block;
        padding: 7px 9px;
        border: 2px solid var(--line);
        border-radius: 9999px;
        color: var(--accent-2);
        font-size: 10px;
        line-height: 1.6;
        background: #bfedd1;
      }

      .entry-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }

      .detail-grid {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .meta-row {
        display: grid;
        grid-template-columns: 110px minmax(0, 1fr);
        gap: 10px;
        padding: 9px 0;
        border-top: 2px dashed var(--line-soft);
      }

      .meta-row:first-child {
        border-top: 0;
      }

      .meta-label {
        color: var(--accent);
        font-size: 10px;
        line-height: 1.6;
      }

      .meta-value {
        font-size: 15px;
        line-height: 1.55;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .entry-nav {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .pixel-btn {
        width: 100%;
        padding: 14px 12px;
        border: 2px solid var(--line);
        border-radius: 9999px;
        background: var(--surface-accent);
        color: #ffffff;
        cursor: pointer;
        font-family: "Press Start 2P", monospace;
        font-size: 11px;
        line-height: 1.6;
        text-transform: uppercase;
        box-shadow: 4px 4px 0 0 #5ca7c7;
      }

      .pixel-btn.alt {
        background: #e8e883;
        color: #494900;
        box-shadow: 4px 4px 0 0 #c9c968;
      }

      .pixel-btn:hover,
      .pixel-btn:focus-visible {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 0 var(--shadow-strong);
      }

      .pixel-btn:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .notes {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .status {
        padding: 10px 12px;
        background: var(--surface-strong);
        color: var(--accent);
        font-size: 10px;
        line-height: 1.7;
      }

      .status.error {
        color: var(--danger);
      }

      .footer {
        margin-top: 2px;
        color: var(--accent);
        font-size: 9px;
        line-height: 1.7;
        text-align: center;
      }

      .empty {
        padding: 18px 10px;
        border: 2px dashed var(--line);
        border-radius: 20px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
        background: var(--surface-soft);
      }

      @media (min-width: 860px) {
        .dex-body {
          grid-template-columns: minmax(0, 360px) minmax(0, 1fr);
          align-items: start;
        }

        .roster-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100% - 10px, 1120px);
          padding-top: 8px;
        }

        .counts {
          grid-template-columns: 1fr;
        }

        .app-nav {
          grid-template-columns: 1fr;
        }

        .hero,
        .dex,
        .panel,
        .bird-card,
        .count,
        .status {
          border-width: 2px;
          box-shadow: 4px 4px 0 0 var(--shadow);
        }

        .bird-card {
          grid-template-columns: 64px minmax(0, 1fr);
        }

        .sprite-frame {
          width: 64px;
          height: 64px;
        }

        .detail-sprite-frame {
          min-height: 220px;
        }

        .roster-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>

  <body class="page-hidden">
    <div class="grid-overlay"></div>

    <div class="shell">
      <div class="topbar">
        <a class="top-link" href="/apps">Apps</a>
        <button class="logout-btn" id="logoutButton">Log Out</button>
      </div>

      <main class="hud">
        <section class="hero">
          <div class="eyebrow">N.Y. Field Dex v0.1</div>
          <h1>Aviadex</h1>
          <p class="subtitle">
            A DS-era inspired bird index for New York. Log sightings, unlock entries, and build a living roster one bird at a time.
          </p>
        </section>

        <nav class="app-nav" id="appNav">
          <button class="nav-pill" data-view="home" type="button">Home</button>
          <button class="nav-pill" data-view="roster" type="button">Roster</button>
          <button class="nav-pill" data-view="entry" type="button">Entry</button>
        </nav>

        <section class="view" id="homeView">
          <section class="counts" id="counts"></section>

          <section class="dex">
            <div class="panel-head">
              <div class="panel-label">Field Status</div>
              <button class="nav-btn" id="resetButton" type="button">Reset Progress</button>
            </div>

            <aside class="panel" id="detailPanel"></aside>
          </section>
        </section>

        <section class="view" id="rosterView">
          <section class="dex-roster">
            <div class="panel-head">
              <div class="panel-label">Bird Roster</div>
              <button class="nav-btn" id="resetButtonRoster" type="button">Reset Progress</button>
            </div>

            <input class="search" id="searchInput" type="search" placeholder="search ny birds">
            <div class="roster-controls">
              <button class="pixel-btn alt" id="rosterPrevButton" type="button">Previous</button>
              <button class="pixel-btn" id="rosterNextButton" type="button">Next</button>
            </div>
            <div class="roster-grid" id="rosterGrid"></div>
          </section>
        </section>

        <section class="view" id="entryView">
          <section class="dex">
            <div class="panel-head">
              <div class="panel-label">Dex Entry</div>
              <button class="nav-btn" id="viewRosterButton" type="button">Open Roster</button>
            </div>

            <aside class="panel" id="entryDetailPanel"></aside>
          </section>
        </section>

        <div class="status" id="status"></div>
        <div class="footer">DS-era inspired birding index. Progress is stored on this device.</div>
      </main>
    </div>

      const STORAGE_KEY = "aviadex-progress-v1";
      const status = document.getElementById("status");
      const logoutButton = document.getElementById("logoutButton");
      const searchInput = document.getElementById("searchInput");
      const appNav = document.getElementById("appNav");
      const rosterGrid = document.getElementById("rosterGrid");
      const detailPanel = document.getElementById("detailPanel");
      const entryDetailPanel = document.getElementById("entryDetailPanel");
      const counts = document.getElementById("counts");
      const resetButton = document.getElementById("resetButton");
      const resetButtonRoster = document.getElementById("resetButtonRoster");
      const rosterPrevButton = document.getElementById("rosterPrevButton");
      const rosterNextButton = document.getElementById("rosterNextButton");
      const viewRosterButton = document.getElementById("viewRosterButton");
      const authConfig = window.AUTH_CONFIG || {};
      const hasConfig = Boolean(authConfig.supabaseUrl && authConfig.supabaseAnonKey);
      const VIEW_HASHES = new Set(["home", "roster", "entry"]);
      const ASSET_VERSION = "2026-05-05-2";

      let progress = loadProgress();
      let selectedSlug = "blue-jay";
      let searchQuery = "";
      let currentView = "home";

      function setStatus(message, type = "") {
        status.textContent = message;
        status.className = `status ${type}`.trim();
      }

      function loadProgress() {
        try {
          const parsed = JSON.parse(window.localStorage.getItem(STORAGE_KEY) || "{}");
          return { sightings: parsed.sightings || {} };
        } catch (_error) {
          return { sightings: {} };
        }
      }

      function saveProgress() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      }

      function getSightings(slug) {
        return Number(progress.sightings[slug] || 0);
      }

      function isUnlocked(slug) {
        return getSightings(slug) > 0;
      }

      function formatSpeciesId(id) {
        return `NY-${id}`;
      }

      function getRarityClass(rarity) {
        const key = String(rarity || "").trim().toLowerCase();
        return {
          common: "rarity-common",
          uncommon: "rarity-uncommon",
          rare: "rarity-rare",
          legendary: "rarity-legendary"
        }[key] || "rarity-common";
      }

      function getHashView() {
        const hash = window.location.hash.replace(/^#/, "").trim().toLowerCase();
        return VIEW_HASHES.has(hash) ? hash : "home";
      }

      function syncHashFromView() {
        const nextHash = `#${currentView}`;
        if (window.location.hash !== nextHash) {
          window.history.replaceState({}, "", `${window.location.pathname}${window.location.search}${nextHash}`);
        }
      }

      function getFilteredBirds() {
        const query = searchQuery.trim().toLowerCase();

        if (!query) {
          return BIRDS;
        }

        return BIRDS.filter((bird) => {
          return [
            bird.name,
            bird.type,
            bird.habitat,
            bird.rarity,
            bird.season
          ].some((value) => value.toLowerCase().includes(query));
        });
      }

      function ensureValidSelection() {
        const filtered = getFilteredBirds();

        if (!filtered.length) {
          selectedSlug = "";
          return;
        }

        if (!filtered.some((bird) => bird.slug === selectedSlug)) {
          selectedSlug = filtered[0].slug;
        }
      }

      function selectRelativeBird(step) {
        const filtered = getFilteredBirds();
        if (!filtered.length) {
          return;
        }

        const currentIndex = filtered.findIndex((bird) => bird.slug === selectedSlug);
        const safeIndex = currentIndex === -1 ? 0 : currentIndex;
        const nextIndex = (safeIndex + step + filtered.length) % filtered.length;
        selectedSlug = filtered[nextIndex].slug;
      }

      function createSpriteSvg(bird, size = 16, grayscale = false) {
        const palette = {
          "1": bird.colors.body,
          "2": bird.colors.head,
          "3": bird.colors.accent,
          "4": bird.colors.wing,
          "5": bird.colors.beak,
          "6": bird.colors.leg
        };

        const rects = [];

        bird.sprite.forEach((row, y) => {
          row.split("").forEach((cell, x) => {
            if (cell === "0") {
              return;
            }

            const fill = palette[cell] || bird.colors.body;
            rects.push(`<rect x="${x * size}" y="${y * size}" width="${size}" height="${size}" fill="${fill}" />`);
          });
        });

        return `
          <svg viewBox="0 0 256 256" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="${grayscale ? "filter: grayscale(1);" : ""}">
            ${rects.join("")}
          </svg>
        `;
      }

      function createLockedOutlineSvg(bird, size = 16) {
        const rows = bird.sprite.map((row) => row.split("").map((cell) => cell !== "0"));
        const fillRects = [];
        const outlineRects = [];

        rows.forEach((row, y) => {
          row.forEach((filled, x) => {
            if (!filled) {
              return;
            }

            const neighbors = [
              rows[y - 1]?.[x],
              rows[y + 1]?.[x],
              rows[y]?.[x - 1],
              rows[y]?.[x + 1]
            ];

            const edge = neighbors.some((neighbor) => !neighbor);
            const bucket = edge ? outlineRects : fillRects;
            bucket.push(
              `<rect x="${x * size}" y="${y * size}" width="${size}" height="${size}" fill="${edge ? "#425b74" : "#f7f1e8"}" />`
            );
          });
        });

        return `
          <svg class="locked-outline" viewBox="0 0 256 256" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            ${fillRects.join("")}
            ${outlineRects.join("")}
          </svg>
        `;
      }

      function renderSpriteMarkup(bird, size = 16, locked = false) {
        const assetSrc = bird.assetPath ? `${bird.assetPath}?v=${ASSET_VERSION}` : "";

        if (locked) {
          if (bird.assetPath) {
            return `
              <div class="locked-asset" aria-hidden="true">
                <img class="locked-asset-outline" src="${assetSrc}" alt="">
                <img class="locked-asset-fill" src="${assetSrc}" alt="">
              </div>
            `;
          }

          return createLockedOutlineSvg(bird, size);
        }

        if (bird.assetPath) {
          return `<img class="sprite-img" src="${assetSrc}" alt="${bird.name}">`;
        }

        return createSpriteSvg(bird, size, false);
      }

      function renderCounts() {
        const unlocked = BIRDS.filter((bird) => isUnlocked(bird.slug)).length;
        const totalSightings = Object.values(progress.sightings).reduce((sum, count) => sum + Number(count || 0), 0);

        counts.innerHTML = `
          <div class="count">
            <div class="panel-label">Unlocked</div>
            <div class="count-number">${unlocked}</div>
            <div class="count-copy">of ${BIRDS.length} New York birds</div>
          </div>
          <div class="count">
            <div class="panel-label">Sightings</div>
            <div class="count-number">${totalSightings}</div>
            <div class="count-copy">logged on this device</div>
          </div>
          <div class="count">
            <div class="panel-label">Selected</div>
            <div class="count-number">${selectedSlug ? formatSpeciesId(BIRDS.find((bird) => bird.slug === selectedSlug).id) : "---"}</div>
            <div class="count-copy">active field entry</div>
          </div>
        `;
      }

      function renderRosterGrid() {
        const filtered = getFilteredBirds();

        if (!filtered.length) {
          rosterGrid.innerHTML = `<div class="empty">No birds match that search. Try a broader New York field term.</div>`;
          return;
        }

        rosterGrid.innerHTML = filtered.map((bird) => {
          const unlocked = isUnlocked(bird.slug);
          const active = bird.slug === selectedSlug;
          const displayName = unlocked ? bird.name : "Unknown Bird";
          const subtitle = unlocked ? bird.type : "Unseen";

          return `
            <button class="roster-card ${active ? "is-active" : ""} ${unlocked ? "" : "is-locked"}" data-slug="${bird.slug}" type="button">
              <div class="roster-card-top">
                <div class="bird-id">${formatSpeciesId(bird.id)}</div>
                <div class="roster-tag">${unlocked ? `${getSightings(bird.slug)} seen` : "locked"}</div>
              </div>
              <div class="roster-sprite">${renderSpriteMarkup(bird, 5, !unlocked)}</div>
              <div class="roster-name">${displayName}</div>
              <div class="meta-stack">
                <div class="roster-meta">${subtitle}</div>
                ${unlocked ? `<span class="rarity-pill ${getRarityClass(bird.rarity)}">${bird.rarity}</span>` : ""}
              </div>
            </button>
          `;
        }).join("");
      }

            <div class="entry-nav">
              <button class="pixel-btn alt" data-action="prev-bird" type="button">Previous</button>
              <button class="pixel-btn" data-action="next-bird" type="button">Next</button>
            </div>
            <button class="pixel-btn" data-action="add-sighting" type="button">${unlocked ? "Add Another Sighting" : "Add Sighting"}</button>
            <button class="pixel-btn alt" data-action="next-locked" type="button">Jump To Next Locked</button>
            <div class="notes">${unlocked ? bird.notes : "Locked birds appear as silhouette outlines until you log the first sighting."}</div>
          </div>
        `;
      }

      function bindDetailActions() {
        const bird = BIRDS.find((item) => item.slug === selectedSlug);

        document.querySelectorAll('[data-action="prev-bird"]').forEach((button) => {
          button.addEventListener("click", () => {
            selectRelativeBird(-1);
            currentView = "entry";
            renderApp();
          });
        });

        document.querySelectorAll('[data-action="next-bird"]').forEach((button) => {
          button.addEventListener("click", () => {
            selectRelativeBird(1);
            currentView = "entry";
            renderApp();
          });
        });

        document.querySelectorAll('[data-action="add-sighting"]').forEach((button) => {
          button.addEventListener("click", () => {
            progress.sightings[bird.slug] = getSightings(bird.slug) + 1;
            saveProgress();
            renderApp();
            setStatus(`${bird.name} logged. Total sightings: ${progress.sightings[bird.slug]}.`, "success");
          });
        });

        document.querySelectorAll('[data-action="next-locked"]').forEach((button) => {
          button.addEventListener("click", () => {
            const nextLocked = BIRDS.find((item) => !isUnlocked(item.slug));
            if (!nextLocked) {
              setStatus("All listed New York birds are unlocked.", "success");
              return;
            }

            selectedSlug = nextLocked.slug;
            currentView = "entry";
            renderApp();
          });
        });
      }

      function renderDetailPanels() {
        if (!selectedSlug) {
          const empty = `<div class="empty">Pick a bird entry to inspect it.</div>`;
          detailPanel.innerHTML = empty;
          entryDetailPanel.innerHTML = empty;
          return;
        }

        const markup = getDetailMarkup();
        detailPanel.innerHTML = markup;
        entryDetailPanel.innerHTML = markup;

        bindDetailActions();
      }

      function renderViews() {
        const views = {
          home: document.getElementById("homeView"),
          roster: document.getElementById("rosterView"),
          entry: document.getElementById("entryView")
        };

        Object.entries(views).forEach(([name, element]) => {
          element.classList.toggle("is-active", name === currentView);
        });

        appNav.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.view === currentView);
        });

        syncHashFromView();
      }

      function renderApp() {
        ensureValidSelection();
        renderCounts();
        renderRosterGrid();
        renderDetailPanels();
        renderViews();

        rosterGrid.querySelectorAll("[data-slug]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedSlug = button.dataset.slug;
            currentView = "entry";
            renderApp();
          });
        });
      }

      if (!hasConfig) {
        setStatus("Auth is not configured for this environment.", "error");
        throw new Error("Missing Supabase config");
      }

      const supabase = createClient(authConfig.supabaseUrl, authConfig.supabaseAnonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });

      async function requireSession() {
        const { data, error } = await supabase.auth.getSession();

        if (error) {
          setStatus(error.message, "error");
          return;
        }

        if (!data.session?.user) {
          window.location.replace("/?message=denied");
          return;
        }

        document.body.classList.remove("page-hidden");
        currentView = getHashView();
        renderApp();
        setStatus("Aviadex online. Add sightings to unlock New York birds.", "success");
      }

      searchInput.addEventListener("input", (event) => {
        searchQuery = event.target.value;
        currentView = "roster";
        renderApp();
      });

      rosterPrevButton.addEventListener("click", () => {
        selectRelativeBird(-1);
        currentView = "roster";
        renderApp();
      });

      rosterNextButton.addEventListener("click", () => {
        selectRelativeBird(1);
        currentView = "roster";
        renderApp();
      });

      function resetProgress() {
        progress = { sightings: {} };
        saveProgress();
        selectedSlug = "blue-jay";
        renderApp();
        setStatus("Local Aviadex progress reset.", "success");
      }

      resetButton.addEventListener("click", resetProgress);
      resetButtonRoster.addEventListener("click", resetProgress);

      appNav.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => {
          currentView = button.dataset.view;
          renderApp();
        });
      });

      window.addEventListener("hashchange", () => {
        const nextView = getHashView();
        if (nextView !== currentView) {
          currentView = nextView;
          renderApp();
        }
      });

      viewRosterButton.addEventListener("click", () => {
        currentView = "roster";
        renderApp();
      });

      logoutButton.addEventListener("click", async () => {
        const { error } = await supabase.auth.signOut();

        if (error) {
          setStatus(error.message, "error");
          return;
        }

        window.location.replace("/");
      });

      supabase.auth.onAuthStateChange((event, session) => {
        if (event === "SIGNED_OUT" || !session?.user) {
          window.location.replace("/?message=denied");
        }
      });

      await requireSession();
    </script>
  </body>
</html>
