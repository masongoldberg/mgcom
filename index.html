<!DOCTYPE html>
<html>
  <head>
    <title>Mason Goldberg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #000;
        color: white;
        height: 100vh;
        overflow: hidden;
      }

      .bg-image {
        position: absolute;
        inset: 0;
        background: url("https://images.unsplash.com/photo-1723036123278-48b332ad8030?q=80&w=2068&auto=format&fit=crop") center/cover no-repeat;
        opacity: 0.25;
        z-index: -2;
      }

      .blob {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #fc8403, transparent);
        top: 20%;
        left: 20%;
        filter: blur(120px);
        z-index: -1;
        opacity: 0.8;
      }

      .login-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 14px;
        opacity: 0.7;
        cursor: pointer;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 90%;
        max-width: 500px;
      }

      h1 {
        font-size: 72px;
        margin: 0;
        letter-spacing: -2px;
      }

      .links {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 25px;
      }

      a {
        text-decoration: none;
        color: white;
        opacity: 0.6;
        font-style: italic;
      }

      a:hover {
        opacity: 1;
      }

      .corner {
        position: absolute;
        bottom: 20px;
        right: 20px;
        font-size: 12px;
        color: #666;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(20px);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-content {
        text-align: center;
        max-width: 320px;
        width: 100%;
      }

      .modal h3 {
        font-weight: 400;
        font-size: 14px;
        color: #777;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid #333;
        padding: 10px 0;
        color: white;
        margin-bottom: 14px;
      }

      button {
        background: none;
        border: none;
        color: #fc8403;
        cursor: pointer;
      }

      /* 🔥 MOBILE FIXES */
      @media (max-width: 600px) {

        h1 {
          font-size: 42px;
          line-height: 1.1;
        }

        .links {
          flex-direction: column;
          gap: 14px;
          margin-top: 24px;
        }

        a {
          font-size: 16px;
        }

        .blob {
          width: 260px;
          height: 260px;
          top: 10%;
          left: 10%;
          filter: blur(100px);
        }

        .bg-image {
          opacity: 0.35;
        }

        .login-btn {
          font-size: 13px;
        }

        .corner {
          font-size: 10px;
        }
      }

    </style>
  </head>

  <body>

    <div class="bg-image"></div>
    <div class="blob"></div>

    <div class="login-btn" onclick="openLogin()">Log In</div>

    <div class="container">
      <h1>Mason Goldberg</h1>

      <div class="links">
        <a href="#">projects</a>
        <a href="#">experiments</a>
        <a href="#">contact</a>
      </div>
    </div>

    <div class="corner">v0.1</div>

    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>log in</h3>
        <input placeholder="email">
        <input placeholder="password" type="password">
        <button onclick="fakeLogin()">enter</button>
      </div>
    </div>

    <script>
      function openLogin() {
        document.getElementById("modal").style.display = "flex";
      }

      function fakeLogin() {
        alert("not wired up yet");
      }

      window.onclick = function(e) {
        const modal = document.getElementById("modal");
        if (e.target === modal) {
          modal.style.display = "none";
        }
      };
    </script>

  </body>
</html>
