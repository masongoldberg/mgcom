<!DOCTYPE html>
<html>
  <head>
    <title>Mason Goldberg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at 30% 20%, #1a1a1a, #000);
        color: white;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        max-width: 700px;
        padding: 20px;
      }

      h1 {
        font-size: 72px;
        margin: 0;
        letter-spacing: -2px;
      }

      .subtitle {
        margin-top: 10px;
        font-size: 16px;
        color: #aaa;
      }

      .links {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 25px;
      }

      a {
        text-decoration: none;
        color: white;
        opacity: 0.6;
        transition: all 0.2s ease;
      }

      a:hover {
        opacity: 1;
        letter-spacing: 2px;
      }

      /* floating blob */
      .blob {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #fc8403, transparent);
        top: 20%;
        left: 20%;
        filter: blur(120px);
        z-index: -1;
      }

      @keyframes float {
        from {
          transform: translate(0, 0);
        }
        to {
          transform: translate(100px, 80px);
        }
      }

      /* little corner text */
      .corner {
        position: absolute;
        bottom: 20px;
        right: 20px;
        font-size: 12px;
        color: #666;
      }

      
    </style>
  </head>

  <body>

    <div class="blob"></div>

    <div class="container">
      <h1>Mason Goldberg</h1>

      <div class="links">
        <a href="#">projects</a>
        <a href="#">experiments</a>
        <a href="#">contact</a>
      </div>
    </div>

    <div class="corner">v0.1</div>

    <script>
      // trailing cursor dots (subtle but fun)
      document.addEventListener("mousemove", (e) => {
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.style.left = e.pageX + "px";
        dot.style.top = e.pageY + "px";

        document.body.appendChild(dot);

        setTimeout(() => {
          dot.remove();
        }, 500);
      });
    </script>

  </body>
</html>
