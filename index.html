<!DOCTYPE html>
<html>
  <head>
    <title>Mason Goldberg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --text: #ffffff;
        --muted: #9f9f9f;
        --line: rgba(255, 255, 255, 0.16);
        --panel: rgba(12, 12, 12, 0.72);
        --accent: #fc8403;
        --accent-soft: rgba(252, 132, 3, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #000;
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
      }

      .bg-image {
        position: absolute;
        inset: 0;
        background: url("https://images.unsplash.com/photo-1723036123278-48b332ad8030?q=80&w=2068&auto=format&fit=crop") center/cover no-repeat;
        opacity: 0.25;
        z-index: -2;
      }

      .blob {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #fc8403, transparent);
        top: 20%;
        left: 20%;
        filter: blur(120px);
        z-index: -1;
        opacity: 0.8;
      }

      .top-bar {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 16px;
      }

      .login-btn {
        font-size: 14px;
        opacity: 0.78;
      }

      .login-btn {
        cursor: pointer;
      }

      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 90%;
        max-width: 500px;
      }

      h1 {
        font-size: 72px;
        margin: 0;
        letter-spacing: -2px;
      }

      .links {
        margin-top: 40px;
        display: flex;
        justify-content: center;
        gap: 25px;
      }

      a {
        text-decoration: none;
        color: white;
        opacity: 0.6;
        font-style: italic;
      }

      a:hover {
        opacity: 1;
      }

      .modal.hidden {
        display: none;
      }

      .corner {
        position: absolute;
        bottom: 20px;
        right: 20px;
        font-size: 12px;
        color: #666;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal-content {
        text-align: left;
        max-width: 360px;
        width: 100%;
        padding: 24px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: rgba(8, 8, 8, 0.88);
        box-shadow: 0 16px 60px rgba(0, 0, 0, 0.38);
      }

      .modal h3 {
        font-weight: 400;
        font-size: 14px;
        color: #777;
        margin: 0 0 8px;
      }

      .modal-title {
        font-size: 28px;
        margin: 0 0 10px;
      }

      .modal-copy {
        color: var(--muted);
        margin: 0 0 24px;
        line-height: 1.5;
      }

      .form-status {
        min-height: 22px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .form-status.error {
        color: #ff8d8d;
      }

      .form-status.success {
        color: #ffc17b;
      }

      input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid #333;
        padding: 12px 0;
        color: white;
        margin-bottom: 14px;
        font-size: 15px;
      }

      button {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 15px;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        margin-top: 6px;
      }

      .button-primary {
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--accent-soft);
        border: 1px solid rgba(252, 132, 3, 0.32);
      }

      .button-secondary {
        color: var(--text);
        opacity: 0.7;
      }

      .helper-copy {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 600px) {
        body {
          overflow: auto;
        }

        h1 {
          font-size: 42px;
          line-height: 1.1;
        }

        .links {
          flex-direction: column;
          gap: 14px;
          margin-top: 24px;
        }

        a {
          font-size: 16px;
        }

        .blob {
          width: 260px;
          height: 260px;
          top: 10%;
          left: 10%;
          filter: blur(100px);
        }

        .bg-image {
          opacity: 0.35;
        }

        .login-btn {
          font-size: 13px;
        }

        .corner {
          font-size: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-image"></div>
    <div class="blob"></div>

    <div class="top-bar">
      <div class="login-btn" id="loginButton">Log In</div>
    </div>

    <div class="container">
      <h1>Mason Goldberg</h1>

      <div class="links">
        <a href="#">projects</a>
        <a href="#">experiments</a>
        <a href="#">contact</a>
      </div>
    </div>

    <div class="corner">v0.2</div>

    <div class="modal hidden" id="modal">
      <div class="modal-content">
        <h3>account access</h3>
        <h2 class="modal-title">Sign in</h2>

        <div class="form-status" id="formStatus"></div>

        <input id="emailInput" placeholder="email" type="email" autocomplete="email">
        <input id="passwordInput" placeholder="password" type="password" autocomplete="current-password">

        <div class="button-row">
          <button class="button-primary" id="signInButton">Sign In</button>
          <button class="button-secondary" id="closeButton">Close</button>
        </div>
      </div>
    </div>

    <script src="/api/auth-config"></script>
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const modal = document.getElementById("modal");
      const loginButton = document.getElementById("loginButton");
      const closeButton = document.getElementById("closeButton");
      const signInButton = document.getElementById("signInButton");
      const formStatus = document.getElementById("formStatus");
      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");

      const authConfig = window.AUTH_CONFIG || {};
      const hasConfig = Boolean(authConfig.supabaseUrl && authConfig.supabaseAnonKey);
      const supabase = hasConfig
        ? createClient(authConfig.supabaseUrl, authConfig.supabaseAnonKey, {
            auth: {
              persistSession: true,
              autoRefreshToken: true,
              detectSessionInUrl: true
            }
          })
        : null;

      function openLogin() {
        modal.classList.remove("hidden");
      }

      function closeLogin() {
        modal.classList.add("hidden");
      }

      function setStatus(message, type = "") {
        formStatus.textContent = message;
        formStatus.className = `form-status ${type}`.trim();
      }

      function clearInputs() {
        passwordInput.value = "";
      }

      function renderSession(session) {
        if (!hasConfig) {
          loginButton.textContent = "Auth not configured";
          setStatus("Add SUPABASE_URL and SUPABASE_ANON_KEY in Vercel, then redeploy.", "error");
          return;
        }

        if (!session?.user) {
          loginButton.textContent = "Log In";
          return;
        }

        loginButton.textContent = "Account";
      }

      async function syncSession() {
        if (!supabase) {
          renderSession(null);
          return;
        }

        const { data, error } = await supabase.auth.getSession();

        if (error) {
          setStatus(error.message, "error");
          return;
        }

        renderSession(data.session);
      }

      async function signIn() {
        if (!supabase) {
          setStatus("Supabase is not configured yet.", "error");
          return;
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          setStatus("Enter both email and password.", "error");
          return;
        }

        setStatus("Signing in...");
        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          setStatus(error.message, "error");
          return;
        }

        setStatus("Signed in.", "success");
        clearInputs();
        closeLogin();
        window.alert("You've logged in now, congratulations!");
        await syncSession();
      }

      loginButton.addEventListener("click", () => {
        if (modal.classList.contains("hidden")) {
          openLogin();
        } else {
          closeLogin();
        }
      });

      closeButton.addEventListener("click", closeLogin);
      signInButton.addEventListener("click", signIn);

      [emailInput, passwordInput].forEach((input) => {
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            signIn();
          }

          if (event.key === "Escape") {
            closeLogin();
          }
        });
      });

      window.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeLogin();
        }
      });

      if (!supabase) {
        setStatus("Supabase config not found yet. Add Vercel env vars to finish setup.", "error");
        renderSession(null);
      } else {
        supabase.auth.onAuthStateChange((_event, session) => {
          renderSession(session);
        });

        await syncSession();
      }
    </script>
  </body>
</html>
